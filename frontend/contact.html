<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f7f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        margin: 0;
        width: 100%;
      }
      form {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        text-align: center;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      textarea {
        resize: vertical;
        height: 100px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #0056b3;
      }

      .navbar {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">
        <img src="image/LOGO2.png" width="150px" />
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <!-- <li><a href="Product.html">Product</a></li> -->
          <li><a href="About.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html" id="__account-link">Account</a></li>
          <span id="__user-greeting" style="display: none">Hi user!</span>
          <!-- <button id="__logout-btn" style="display: none">Logout</button> -->
        </ul>
      </nav>
    </div>
    <form>
      <h1>Contact Us</h1>
      <label for="name">Full Name</label>
      <input
        type="text"
        id="__contact-name"
        name="name"
        placeholder="Enter your full name"
        required
      />

      <label for="email">Email</label>
      <input
        type="email"
        id="__contact-email"
        name="email"
        placeholder="Enter your email address"
        required
      />

      <label for="message">Message</label>
      <textarea
        id="__contact-message"
        name="message"
        placeholder="Enter your message"
        required
      ></textarea>

      <button id="__contact-btn" type="button">Send Message</button>
    </form>

    <footer>
      <p>&copy; 2025 styke. All rights reserved.</p>
    </footer>

    <script src="./js/dist/bundle.js" defer></script>
  </body>
</html>
