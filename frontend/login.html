

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f7f7f7;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 100vh;
        margin: 0;
        width: 100%;
        flex-direction: column;
      }
      form {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 20px;
        text-align: center;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #0056b3;
      }
      p {
        text-align: center;
        margin-top: 15px;
      }
      a {
        color: #007bff;
        text-decoration: none;
      }

      .navbar {
        width: 100%;
        top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="logo">
        <img src="image/LOGO2.png" width="150px" />
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <!-- <li><a href="Product.html">Product</a></li> -->
          <li><a href="About.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html" id="__account-link">Account</a></li>
          <span id="__user-greeting" style="display: none">Hi user!</span>
          <button id="__logout-btn" style="display: none">Logout</button>
        </ul>
      </nav>
    </div>
    <form id="__login-form">
      <h1>Login</h1>
      <input
        type="text"
        name="username"
        placeholder="Enter Username"
        required
        id="__login-username"
      />
      <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required
        id="__login-password"
      />
      <button id="__login-btn">Login</button>
      <p>Don't have an account? <a href="sign_in.html">Sign up here</a></p>
    </form>

    <footer>
      <p>&copy; 2025 styke. All rights reserved.</p>
    </footer>

    <script src="js/dist/bundle.js" defer></script>
  </body>
</html>
